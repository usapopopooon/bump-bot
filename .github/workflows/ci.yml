name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -e ".[dev]" taplo

      - name: Requirements sync
        run: python scripts/sync_requirements.py --check

      - name: TOML lint
        run: python scripts/toml_lint.py

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff check
        run: ruff check src tests scripts

      - name: mypy
        run: mypy src

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: bump_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d bump_bot_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -e ".[dev]"

      - name: pytest
        run: pytest -v
        env:
          DISCORD_TOKEN: test_token
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost/bump_bot_test
